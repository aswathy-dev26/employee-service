server:
  port: 8081

spring:
  application:
    name: employee-service

  datasource:
    url: jdbc:postgresql://localhost:5432/employee_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
eureka:
  client:
    enabled: false
logging:
  level:
    root: INFO
    com.employee management: DEBUG